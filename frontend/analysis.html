<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 분석 | KB 개발자 역량평가 CBT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="analysis">
  <header class="topbar">
    <a class="brand" href="index.html" id="homeLink" aria-label="KB 개발자 역량평가 CBT">
      <img class="brand-logo" src="assets/brand/kb-masters-logo.png" alt="KB 디지털 역량진단 문제풀이" />
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn" href="index.html" data-screen="profile">시험응시</a>
      <a class="nav-btn" href="wrong.html" data-screen="wrong">오답노트</a>
      <a class="nav-btn" href="ai-recommend.html" data-screen="aiRecommend">AI 맞춤형 추천문제</a>
      <a class="nav-btn" href="harness.html" data-screen="harness">AI문제생성</a>
    </nav>
    <div class="profile-actions" data-profile-slot aria-label="profile"></div>
    <div class="top-stats" aria-label="학습 통계">
      <span>Today <strong id="todayCount">0</strong></span>
      <span>Wrong <strong id="wrongTopCount">0</strong></span>
    </div>
  </header>

  <main class="page-shell">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <section class="screen active" id="analysisScreen">
      <div class="screen-head">
        <p class="eyebrow">Profile Analysis</p>
        <h1 id="analysisName">프로필 분석</h1>
        <p>풀이 기록을 기준으로 과목별 강점과 보완점을 시각화합니다.</p>
      </div>

      <section class="analysis-card analysis-commentary-panel">
        <h2>AI총평</h2>
        <div class="analysis-text" id="analysisText"></div>
      </section>

      <div class="analysis-layout">
        <section class="analysis-card radar-panel">
          <h2>과목별 실력 사각형</h2>
          <div class="radar-chart" id="radarChart"></div>
        </section>

        <section class="analysis-card">
          <h2>과목별 점수 너비</h2>
          <div class="subject-bars" id="subjectBars"></div>
        </section>

        <section class="analysis-card">
          <h2>실력 지표</h2>
          <div class="skill-metrics" id="skillMetrics"></div>
        </section>

        <section class="analysis-card">
          <h2>회차별 점수 그래프</h2>
          <div class="score-line-chart" id="examTrend"></div>
        </section>

        <section class="analysis-card">
          <h2>응시 하이라이트</h2>
          <div class="exam-highlights" id="examHighlights"></div>
        </section>
      </div>

      <section class="analysis-card recommendation-panel">
        <h2>AI 맞춤형 추천 문제</h2>
        <div id="recommendationCard"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
