<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 선택 | KB 개발자 역량평가 CBT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="profile">
  <header class="topbar">
    <a class="brand" href="index.html" id="homeLink" aria-label="KB 개발자 역량평가 CBT">
      <span class="brand-mark">KB</span>
      <span>
        <strong>KB 개발자 역량평가</strong>
        <small>개발자 역량평가 CBT</small>
      </span>
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn active" href="index.html" data-screen="profile">시험 응시</a>
      <a class="nav-btn" href="wrong.html" data-screen="wrong">오답노트</a>
      <a class="nav-btn" href="harness.html" data-screen="harness">PDF 생성</a>
    </nav>
    <div class="top-stats" aria-label="학습 통계">
      <span>Today <strong id="todayCount">0</strong></span>
      <span>Wrong <strong id="wrongTopCount">0</strong></span>
    </div>
  </header>

  <main class="page-shell">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <section class="screen active" id="profileScreen">
      <div class="profile-panel">
        <div class="screen-head compact">
          <p class="eyebrow">Profile</p>
          <h1>응시자 프로필을 선택하세요</h1>
          <p>본인의 이름을 선택하면 과목과 문제 수를 설정합니다.</p>
        </div>

        <div class="profile-form">
          <label class="field-label" for="profileSearch">이름</label>
          <div class="search-select" id="profileSelectBox">
            <input id="profileSearch" type="search" autocomplete="off" placeholder="이름을 검색하세요" aria-expanded="false" aria-controls="profileOptions" />
            <select id="profileSelect" aria-label="응시자 이름 선택"></select>
            <div class="select-options" id="profileOptions" role="listbox"></div>
          </div>

          <button class="primary-btn profile-submit" id="startPracticeBtn">문제 풀기</button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
