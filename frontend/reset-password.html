<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KB 비밀번호 재설정</title>
  <link rel="stylesheet" href="style.css?v=20260622-auth-header" />
</head>

<body class="login-body" data-page="reset-password">
  <header class="auth-header">
    <a class="auth-logo-link" href="index.html" aria-label="KB Masters 메인으로 이동">
      <img src="assets/brand/kb-masters-logo.png" alt="KB MASTERS" />
    </a>
  </header>
  <main class="login-shell">
    <section class="login-panel" aria-label="비밀번호 재설정">
      <div class="login-brand">
        <div>
          <strong>비밀번호 재설정</strong>
        </div>
      </div>
      <form class="login-form" id="resetPasswordForm">
        <label class="field-label" for="resetMemberIdInput">사번</label>
        <input id="resetMemberIdInput" class="login-input" name="member_id" type="text" autocomplete="username"
          placeholder="d230251" required />

        <label class="field-label" for="resetPasswordInput">새 비밀번호</label>
        <input id="resetPasswordInput" class="login-input" name="password" type="password" autocomplete="new-password"
          placeholder="새 비밀번호" required />

        <label class="field-label" for="resetPasswordConfirmInput">비밀번호 재입력</label>
        <input id="resetPasswordConfirmInput" class="login-input" name="password_confirm" type="password"
          autocomplete="new-password" placeholder="비밀번호 재입력" required />

        <div class="login-links" aria-label="계정 메뉴">
          <a href="index.html" id="resetReturnLoginLink">로그인으로 돌아가기</a>
        </div>

        <button class="primary-btn login-submit" id="resetPasswordSubmitBtn" type="submit">비밀번호 재설정</button>
        <p class="login-message" id="resetPasswordMessage" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>

</html>
