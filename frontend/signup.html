<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KB 회원가입</title>
  <link rel="stylesheet" href="style.css?v=20260622-auth-header" />
</head>
<body class="login-body" data-page="signup">
  <header class="auth-header">
    <a class="auth-logo-link" href="index.html" aria-label="KB Masters 메인으로 이동">
      <img src="assets/brand/kb-masters-logo.png" alt="KB MASTERS" />
    </a>
  </header>
  <main class="login-shell">
    <section class="login-panel" aria-label="회원가입">
      <div class="login-brand">
        <div>
          <strong>회원가입</strong>
        </div>
      </div>
      <form class="login-form" id="signupForm">
        <label class="field-label" for="signupMemberIdInput">사번</label>
        <input id="signupMemberIdInput" class="login-input" name="member_id" type="text" autocomplete="username" placeholder="d230251" required />

        <label class="field-label" for="signupMemberNameInput">사용자명</label>
        <input id="signupMemberNameInput" class="login-input" name="member_name" type="text" autocomplete="name" placeholder="홍길동" required />

        <label class="field-label" for="signupPasswordInput">비밀번호</label>
        <input id="signupPasswordInput" class="login-input" name="password" type="password" autocomplete="new-password" placeholder="비밀번호" required />

        <div class="login-links" aria-label="계정 메뉴">
          <a href="index.html">로그인으로 돌아가기</a>
        </div>

        <button class="primary-btn login-submit" id="signupSubmitBtn" type="submit">회원가입</button>
        <p class="login-message" id="signupMessage" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
