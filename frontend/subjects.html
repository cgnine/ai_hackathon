<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과목 선택 | KB 개발자 역량평가 CBT</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="subjects">
  <header class="topbar">
    <a class="brand" href="index.html" id="homeLink" aria-label="KB 개발자 역량평가 CBT">
      <span class="brand-mark">KB</span>
      <span>
        <strong>KB 개발자 역량평가</strong>
        <small>개발자 역량평가 CBT</small>
      </span>
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn active" href="index.html" data-screen="profile">시험응시</a>
      <a class="nav-btn" href="wrong.html" data-screen="wrong">오답노트</a>
      <a class="nav-btn" href="harness.html" data-screen="harness">PDF 생성</a>
    </nav>
    <div class="top-stats" aria-label="학습 통계">
      <span>Today <strong id="todayCount">0</strong></span>
      <span>Wrong <strong id="wrongTopCount">0</strong></span>
    </div>
  </header>

  <main class="page-shell">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <section class="screen active" id="subjectsScreen">
      <a class="back-btn inline-link" href="index.html" data-screen="profile">프로필 다시 선택</a>
      <div class="screen-head">
        <p class="eyebrow" id="profileSummary">Select Subject</p>
        <h1>응시할 과목을 선택하세요</h1>
        <p>과목을 선택하기 전에 이번 풀이의 문제 수를 정합니다.</p>
      </div>

      <div class="subject-settings">
        <label class="field-label" for="questionCountInput">문제 수</label>
        <input class="number-input" id="questionCountInput" type="number" min="1" max="100" step="1" value="20" />
      </div>

      <div class="subject-grid" id="subjectGrid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>

</html>
