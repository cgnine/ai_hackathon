<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오답 다시 풀기 | KB 개발자 역량평가 CBT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="wrong-practice">
  <header class="topbar">
    <a class="brand" href="index.html" id="homeLink" aria-label="KB 개발자 역량평가 CBT">
      <span class="brand-mark">KB</span>
      <span>
        <strong>KB 개발자 역량평가</strong>
        <small>개발자 역량평가 CBT</small>
      </span>
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn" href="index.html" data-screen="profile">시험응시</a>
      <a class="nav-btn active" href="wrong.html" data-screen="wrong">오답노트</a>
      <a class="nav-btn" href="harness.html" data-screen="harness">PDF 생성</a>
    </nav>
    <div class="top-stats" aria-label="학습 통계">
      <span>Today <strong id="todayCount">0</strong></span>
      <span>Wrong <strong id="wrongTopCount">0</strong></span>
    </div>
  </header>

  <main class="page-shell">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <section class="screen active">
      <a class="back-btn inline-link" href="wrong.html" data-screen="wrong">오답노트로 돌아가기</a>
      <div class="screen-head compact">
        <p class="eyebrow">Wrong Review</p>
        <h1 id="reviewSubject">오답 다시 풀기</h1>
        <p id="reviewProgress">오답노트에서 복습할 세트를 선택하세요.</p>
      </div>

      <article class="question-panel review-question-panel" id="reviewQuestionPanel">
        <p class="question-text" id="reviewQuestionText"></p>
        <ol class="choices" id="reviewChoices"></ol>
        <div class="answer-actions review-actions">
          <button class="secondary-btn" id="reviewPrevBtn" type="button">이전</button>
          <button class="primary-btn" id="reviewSubmitBtn" type="button">정답 확인</button>
          <button class="secondary-btn" id="reviewNextBtn" type="button">다음</button>
        </div>
      </article>

      <section class="feedback-panel review-feedback" id="reviewFeedback" aria-live="polite"></section>

      <article class="review-complete-panel" id="reviewCompletePanel" hidden>
        <p class="eyebrow">Complete</p>
        <h2>오답 리뷰 완료</h2>
        <p id="reviewCompleteSummary">총 0문항 중 0문항을 다시 맞혔습니다.</p>
        <div class="complete-actions">
          <button class="secondary-btn" id="reviewBackBtn" type="button">오답노트로 돌아가기</button>
          <button class="primary-btn" id="reviewRestartBtn" type="button">다시 풀기</button>
        </div>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
