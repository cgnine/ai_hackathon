<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>응시내역 | KB 개발자 역량평가 CBT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="exam-history">
  <header class="topbar">
    <a class="brand" href="index.html" id="homeLink" aria-label="KB 개발자 역량평가 CBT">
      <img class="brand-logo" src="assets/brand/kb-masters-logo.png" alt="KB 디지털 역량진단 문제풀이" />
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn active" href="index.html" data-screen="profile">시험응시</a>
      <a class="nav-btn" href="wrong.html" data-screen="wrong">오답노트</a>
      <a class="nav-btn" href="ai-recommend.html" data-screen="aiRecommend">AI 맞춤형 추천문제</a>
      <a class="nav-btn" href="harness.html" data-screen="harness">AI문제생성</a>
      <a class="nav-btn" href="ranking.html" data-screen="ranking">AI랭킹</a>
    </nav>
    <div class="profile-actions" data-profile-slot aria-label="profile"></div>
    <div class="top-stats" aria-label="학습 통계">
      <span>Today <strong id="todayCount">0</strong></span>
      <span>Wrong <strong id="wrongTopCount">0</strong></span>
    </div>
  </header>

  <main class="page-shell">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <section class="screen active" id="examHistoryScreen">
      <div class="account-layout">
        <aside class="account-sidebar" aria-label="계정 메뉴">
          <strong>내 정보</strong>
          <nav>
            <a href="profile.html">내정보</a>
            <a class="active" href="history.html">응시내역</a>
            <a href="analysis.html">종합평가</a>
            <button type="button" onclick="logout()">로그아웃</button>
          </nav>
        </aside>

        <section class="my-history-panel exam-history-panel account-content" aria-labelledby="myHistoryTitle">
          <div class="my-history-head">
            <div>
              <h2 id="myHistoryTitle">응시내역</h2>
            </div>
          </div>
          <div class="my-history-controls">
            <div id="examHistoryTabs" class="subject-tabs small"></div>
          </div>

          <div class="my-history-list" id="myExamHistoryList"></div>

          <nav class="pagination" id="examHistoryPagination" aria-label="응시내역 페이지"></nav>
        </section>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
