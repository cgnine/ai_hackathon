<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI문제생성 | KB 개발자 역량평가 CBT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="harness">
  <header class="topbar">
    <a class="brand" href="index.html" id="homeLink" aria-label="KB 개발자 역량평가 CBT">
      <img class="brand-logo" src="assets/brand/kb-masters-logo.png" alt="KB 디지털 역량진단 문제풀이" />
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn" href="index.html" data-screen="subjects">시험응시</a>
      <a class="nav-btn" href="wrong.html" data-screen="wrong">오답노트</a>
      <a class="nav-btn" href="ai-recommend.html" data-screen="aiRecommend">AI 맞춤형 추천문제</a>
      <a class="nav-btn active" href="harness.html" data-screen="harness">AI문제생성</a>
      <a class="nav-btn" href="ranking.html" data-screen="ranking">AI랭킹</a>
    </nav>
    <div class="profile-actions" data-profile-slot aria-label="profile"></div>
    <div class="top-stats" aria-label="학습 통계">
      <span>Today <strong id="todayCount">0</strong></span>
      <span>Wrong <strong id="wrongTopCount">0</strong></span>
    </div>
  </header>

  <main class="page-shell">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <section class="screen active" id="harnessScreen">
      <div class="harness-panel">
        <div>
          <p class="eyebrow">Harness Pipeline</p>
          <h1>AI 문제 생성</h1>
          <p>DB 청크 원문을 바탕으로 Bedrock 생성, 규칙 검증, LLM-as-Judge 평가를 실행합니다.</p>
        </div>
        <label class="prompt-editor">
          <span>생성 프롬프트</span>
          <textarea id="systemPromptInput" spellcheck="false">당신은 IT 개발자 역량평가 시험 문제 출제 전문가입니다.
주어진 교재 원문을 바탕으로 객관식 5지선다 문제 1개를 생성하세요.

반드시 아래 JSON 형식만 응답하세요. 다른 텍스트는 절대 포함하지 마세요.

{
  "question": "문제 내용",
  "choices": ["선택지1", "선택지2", "선택지3", "선택지4", "선택지5"],
  "answer": 정답번호(1~5 정수),
  "explanation": "정답 해설 (원문 근거 포함)",
  "difficulty": "easy 또는 medium 또는 hard",
  "tags": ["태그1", "태그2"],
  "source_summary": "원문에서 문제의 근거가 된 내용 요약"
}

규칙:
- 원문에 명확하게 근거가 있는 내용만 출제한다.
- 정답은 반드시 하나여야 한다.
- 오답은 그럴듯하게 혼동을 줄 수 있어야 한다.
- 해설은 원문 근거를 포함해 30자 이상으로 작성한다.
- 임의로 정보를 추가하거나 추측하지 않는다.</textarea>
        </label>
        <button class="primary-btn" id="generateBtn">AI 문제 생성</button>
        <div class="loading" id="loading">
          <span class="spinner"></span>
          문제를 생성하고 검증하는 중입니다.
        </div>
        <div class="api-result" id="apiResult"></div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
