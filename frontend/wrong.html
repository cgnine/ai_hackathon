<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오답노트 | KB 개발자 역량평가 CBT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="wrong">
  <header class="topbar">
    <a class="brand" href="index.html" id="homeLink" aria-label="KB 개발자 역량평가 CBT">
      <span class="brand-mark">KB</span>
      <span>
        <strong>KB 개발자 역량평가</strong>
        <small>개발자 역량평가 CBT</small>
      </span>
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn" href="index.html" data-screen="subjects">시험응시</a>
      <a class="nav-btn active" href="wrong.html" data-screen="wrong">오답노트</a>
      <a class="nav-btn" href="harness.html" data-screen="harness">PDF 생성</a>
    </nav>
    <div class="top-stats" aria-label="학습 통계">
      <span>Today <strong id="todayCount">0</strong></span>
      <span>Wrong <strong id="wrongTopCount">0</strong></span>
    </div>
  </header>

  <main class="page-shell">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <section class="screen active" id="wrongScreen">
      <div class="screen-head compact">
        <h1>오답노트</h1>
        <p>과목을 선택하면 저장된 오답 세트를 확인할 수 있습니다.</p>
      </div>

      <section class="wrong-subject-section">
        <div class="subject-grid wrong-subject-grid" id="wrongSubjectGrid"></div>

        <section class="wrong-round-section" id="wrongRoundSection" tabindex="-1" aria-labelledby="selectedWrongSubjectTitle" hidden aria-hidden="true" style="display: none;">
          <div class="wrong-round-head">
            <h2 id="selectedWrongSubjectTitle"></h2>
          </div>
          <div class="wrong-round-list" id="wrongRoundList"></div>
        </section>
      </section>

      <div class="wrong-list" id="wrongList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
