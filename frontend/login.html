<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KB디지털역량진단 CBT 로그인</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body" data-page="login">
  <main class="login-shell">
    <section class="login-panel" aria-label="로그인">
      <div class="login-brand">
        <span class="brand-mark">KB</span>
        <div>
          <strong>KB디지털역량진단 CBT 로그인</strong>
        </div>
      </div>
      <form class="login-form" id="loginForm">
        <label class="field-label" for="memberIdInput">사번</label>
        <input id="memberIdInput" class="login-input" name="member_id" type="text" autocomplete="username" placeholder="d230251" required />

        <label class="field-label" for="passwordInput">비밀번호</label>
        <input id="passwordInput" class="login-input" name="password" type="password" autocomplete="current-password" placeholder="비밀번호" />

        <div class="login-links" aria-label="계정 메뉴">
          <a href="#">회원가입</a>
          <a href="#">아이디 찾기</a>
          <a href="#">비밀번호 찾기</a>
        </div>

        <button class="primary-btn login-submit" id="loginSubmitBtn" type="submit">로그인</button>
        <p class="login-message" id="loginMessage" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
