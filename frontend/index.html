<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KB 역량진단 모의고사</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="main">
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="KB 역량진단 모의고사">
      <img class="brand-logo" src="assets/brand/kb-masters-logo.png" alt="KB MASTERS" />
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn" href="login.html">시험응시</a>
      <a class="nav-btn" href="login.html">오답노트</a>
    </nav>
  </header>

  <main class="main-landing">
    <section class="main-hero" aria-label="KB 역량진단 메인">
      <img class="main-hero-image" src="assets/brand/main-hero.png" alt="KB 스타 마스터즈 역량평가" />
    </section>

    <div class="main-side-panel">
      <form class="main-mini-login" id="mainMiniLoginForm" aria-label="간편 로그인">
        <div class="main-mini-login-fields">
          <input id="mainMiniMemberId" type="text" autocomplete="username" placeholder="사번" required />
          <input id="mainMiniPassword" type="password" autocomplete="current-password" placeholder="비밀번호" required />
        </div>
        <button type="submit">로그인</button>
        <div class="main-mini-login-links" aria-label="계정 메뉴">
          <a href="signup.html">회원가입</a>
          <a href="reset-password.html">비밀번호 재설정</a>
        </div>
        <p id="mainMiniLoginMessage" aria-live="polite"></p>
      </form>

      <aside class="main-ranking" id="rankingSection" aria-label="응시 랭킹">
        <div class="main-ranking-head">
          <span id="monthlyRankingTitle">랭킹</span>
        </div>
        <ol class="ranking-list" id="monthlyRankingList">
          <li class="ranking-placeholder">
            <span class="ranking-rank">1</span>
            <span class="ranking-name">&nbsp;</span>
            <strong>&nbsp;</strong>
          </li>
          <li class="ranking-placeholder">
            <span class="ranking-rank">2</span>
            <span class="ranking-name">&nbsp;</span>
            <strong>&nbsp;</strong>
          </li>
          <li class="ranking-placeholder">
            <span class="ranking-rank">3</span>
            <span class="ranking-name">&nbsp;</span>
            <strong>&nbsp;</strong>
          </li>
          <li class="ranking-placeholder">
            <span class="ranking-rank">4</span>
            <span class="ranking-name">&nbsp;</span>
            <strong>&nbsp;</strong>
          </li>
          <li class="ranking-placeholder">
            <span class="ranking-rank">5</span>
            <span class="ranking-name">&nbsp;</span>
            <strong>&nbsp;</strong>
          </li>
        </ol>
      </aside>
    </div>
  </main>

  <footer class="main-footer">
    <div class="main-footer-inner">
      <strong class="main-footer-logo">KB Masters</strong>
      <div class="main-footer-info">
        <p>대표 : CGNINE</p>
        <p>주소 : 서울특별시 중구 수표동 47-1 청계IT타워 9층</p>
        <p>TEL : 02-6936-8547&nbsp;&nbsp;&nbsp; Email : contact@kbmasters.co.kr</p>
      </div>
    </div>
    <div class="main-footer-copy">© CGNINE. All Rights Reserved.</div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
