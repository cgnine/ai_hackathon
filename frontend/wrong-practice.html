<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오답 다시 풀기 | KB 개발자 역량평가 CBT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="wrong-practice">
  <header class="topbar">
    <a class="brand" href="index.html" id="homeLink" aria-label="KB 개발자 역량평가 CBT">
      <img class="brand-logo" src="assets/brand/kb-masters-logo.png" alt="KB 디지털 역량진단 문제풀이" />
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn" href="index.html" data-screen="profile">시험응시</a>
      <a class="nav-btn active" href="wrong.html" data-screen="wrong">오답노트</a>
      <a class="nav-btn" href="ai-recommend.html" data-screen="aiRecommend">AI 맞춤형 추천문제</a>
      <a class="nav-btn" href="harness.html" data-screen="harness">AI문제생성</a>
      <a class="nav-btn" href="ranking.html">AI랭킹</a>
    </nav>
    <div class="profile-actions" data-profile-slot aria-label="profile"></div>
    <div class="top-stats" aria-label="학습 통계">
      <span>Today <strong id="todayCount">0</strong></span>
      <span>Wrong <strong id="wrongTopCount">0</strong></span>
    </div>
  </header>

  <main class="page-shell">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <section class="screen active" id="wrongPracticeScreen" style="visibility: hidden;">
      <div class="screen-head compact wrong-review-top" id="wrongReviewTop">
        <div class="wrong-review-meta-row">
          <h1 id="reviewSubject">오답 문제</h1>
          <span id="reviewProgressCount">- / -</span>
        </div>
        <p id="reviewProgress">오답노트에서 복습할 세트를 선택하세요.</p>
      </div>

      <article class="result-loading wrong-review-loading" id="wrongReviewLoading" aria-live="polite">
        <p>오답 문제를 불러오는 중입니다.</p>
        <div class="result-loading-track" aria-hidden="true">
          <span id="wrongReviewLoadingBar"></span>
        </div>
      </article>

      <article class="question-panel review-question-panel" id="reviewQuestionPanel" hidden>
        <p class="question-text" id="reviewQuestionText"></p>
        <div class="question-scenario-box" id="reviewScenarioBox" hidden></div>
        <strong class="result-detail-title wrong-review-choice-title">보기</strong>
        <ol class="choices" id="reviewChoices"></ol>
        <div class="answer-actions review-actions">
          <button class="secondary-btn" id="reviewPrevBtn" type="button">이전</button>
          <button class="primary-btn" id="reviewSubmitBtn" type="button">정답 확인</button>
          <button class="secondary-btn" id="reviewNextBtn" type="button">다음</button>
        </div>
        <section class="feedback-panel review-feedback" id="reviewFeedback" aria-live="polite" hidden></section>
      </article>

      <article class="review-complete-panel" id="reviewCompletePanel" hidden>
        <div class="review-complete-visual">
          <img src="assets/subjects/wrong-review-result-card.png" alt="" aria-hidden="true" />
          <div class="review-complete-copy">
            <strong id="reviewCompleteScore">0문항 / 총 0문항</strong>
          </div>
        </div>
        <p id="reviewCompleteSummary" class="sr-only">총 0문항 중 0문항을 다시 맞혔습니다.</p>
        <div class="complete-actions">
          <button class="secondary-btn" id="reviewBackBtn" type="button">오답노트로 돌아가기</button>
          <button class="primary-btn" id="reviewRestartBtn" type="button">다시 풀기</button>
        </div>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
