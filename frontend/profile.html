<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내정보 | KB 디지털역량진단 CBT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="my-info">
  <header class="topbar">
    <a class="brand" href="index.html" id="homeLink" aria-label="KB 디지털역량진단 CBT">
      <img class="brand-logo" src="assets/brand/kb-diagnosis-logo.png" alt="KB 디지털역량진단 문제은행" />
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn" href="subjects.html" data-screen="subjects">시험응시</a>
      <a class="nav-btn" href="wrong.html" data-screen="wrong">오답노트</a>
      <a class="nav-btn" href="harness.html" data-screen="harness">AI문제생성</a>
    </nav>
    <div class="top-stats" aria-label="학습 통계">
      <span>Today <strong id="todayCount">0</strong></span>
      <span>Wrong <strong id="wrongTopCount">0</strong></span>
    </div>
  </header>

  <main class="page-shell">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <section class="screen active" id="myInfoScreen">
      <div class="screen-head">
        <p class="eyebrow">My Profile</p>
        <h1>내정보</h1>
        <p>응시자 정보와 학습 요약을 확인합니다.</p>
      </div>

      <section class="my-info-panel">
        <div class="my-info-main">
          <span class="profile-avatar large" id="myInfoAvatar">P</span>
          <div>
            <h2 id="myInfoName">응시자</h2>
            <p>사번 <strong id="myInfoMemberId">-</strong></p>
          </div>
        </div>
        <div class="profile-summary-card my-info-metrics" id="myInfoMetrics"></div>
        <div class="profile-menu-list my-info-menu">
          <a href="history.html">응시내역</a>
          <a href="analysis.html">종합평가</a>
          <a href="subjects.html">새 시험 응시</a>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
