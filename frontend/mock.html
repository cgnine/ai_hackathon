<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모의고사 | KB 개발자 역량평가 CBT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="mock" class="mock-booting">
  <header class="topbar">
    <a class="brand" href="index.html" id="homeLink" aria-label="KB 개발자 역량평가 CBT">
      <img class="brand-logo" src="assets/brand/kb-diagnosis-logo.png" alt="KB 디지털 역량진단 문제풀이" />
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn active" href="index.html" data-screen="profile">시험응시</a>
      <a class="nav-btn" href="wrong.html" data-screen="wrong">오답노트</a>
      <a class="nav-btn" href="ai-recommend.html" data-screen="aiRecommend">AI 맞춤형 추천문제</a>
      <a class="nav-btn" href="harness.html" data-screen="harness">AI문제생성</a>
    </nav>
    <div class="top-stats" aria-label="학습 통계">
      <span>Today <strong id="todayCount">0</strong></span>
      <span>Wrong <strong id="wrongTopCount">0</strong></span>
    </div>
  </header>

  <main class="page-shell">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <section class="screen active" id="mockScreen">
      <div class="exam-layout">
        <aside class="side-panel">
          <a class="back-btn inline-link" href="subjects.html" data-screen="subjects">과목 다시 선택</a>
          <div class="side-summary">
            <span class="label">과목</span>
            <strong id="mockSubject">-</strong>
          </div>
          <div class="side-summary">
            <span class="label">답안 완료</span>
            <strong id="mockProgress">0 / 0</strong>
          </div>
          <div class="question-grid" id="mockQuestionGrid"></div>
          <button class="primary-btn full" id="gradeMockBtn">채점하기</button>
        </aside>

        <section class="work-area">
          <div class="mock-question-list" id="mockQuestionList"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
