<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과목 선택 | KB 개발자 역량평가 CBT</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="subjects">
  <header class="topbar">
    <a class="brand" href="index.html" id="homeLink" aria-label="KB 개발자 역량평가 CBT">
      <img class="brand-logo" src="assets/brand/kb-masters-logo.png" alt="KB 디지털 역량진단 문제풀이" />
    </a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-btn active" href="index.html" data-screen="profile">시험응시</a>
      <a class="nav-btn" href="wrong.html" data-screen="wrong">오답노트</a>
      <a class="nav-btn" href="ai-recommend.html" data-screen="aiRecommend">AI 맞춤형 추천문제</a>
      <a class="nav-btn" href="ranking.html" data-screen="ranking">AI랭킹</a>
    </nav>
    <div class="profile-actions" data-profile-slot aria-label="profile"></div>
    <div class="top-stats" aria-label="학습 통계">
      <span>Today <strong id="todayCount">0</strong></span>
      <span>Wrong <strong id="wrongTopCount">0</strong></span>
    </div>
  </header>

  <main class="page-shell">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <section class="screen active" id="subjectsScreen">
      <div class="subject-page-title" id="subjectPageTitle">
        <div class="subject-guide-row">
          <img class="subject-guide-image" src="assets/subjects/subject-select-guide.png" alt="" aria-hidden="true" />
          <button class="subject-start-btn" id="startSelectedSubjectBtn" type="button">문제 풀기</button>
        </div>
      </div>

      <div class="subject-loading" id="subjectLoading" hidden aria-live="polite">
        <p>잠시만 기다려주세요.</p>
        <div class="result-loading-track" aria-hidden="true">
          <span id="subjectLoadingBar"></span>
        </div>
      </div>

      <div class="subject-grid" id="subjectGrid"></div>
    </section>
  </main>

  <footer class="main-footer">
    <div class="main-footer-inner">
      <strong class="main-footer-logo">KB Masters</strong>
      <div class="main-footer-info">
        <p>대표 : CGNINE</p>
        <p>주소 : 서울특별시 중구 수표동 47-1 청계IT타워 9층</p>
        <p class="main-footer-contact">TEL : 02-6936-8547&nbsp;&nbsp;&nbsp; Email : contact@kbmasters.co.kr <span>© CGNINE. All Rights Reserved.</span></p>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    document.getElementById("subjectExamYear").textContent = new Date().getFullYear();
  </script>
</body>

</html>
